            <div className="bg-gradient-logo p-2.5 rounded-2xl shadow-xl relative z-10 overflow-hidden">
              <Globe className="h-7 w-7 text-white animate-pulse" />
            </div>
            <div className="absolute -bottom-2 -left-2 bg-secondary p-1 rounded-full shadow-lg z-20 border-2 border-background dark:border-[#0b101b]">
              <HandHeart className="h-3 w-3 text-secondary-foreground" />
            </div>
          </div>
          <div className="flex flex-col">
            <span className="font-black text-2xl tracking-tighter text-gradient-logo leading-none">APDESE</span>
            <span className="text-[8px] uppercase tracking-[0.3em] font-black text-secondary/80">NGO • RDC</span>
          </div>
        </div>
      );

      // --- Main Components ---
      const Navbar = ({ lang, setLang, theme, toggleTheme }) => {
        const [isOpen, setIsOpen] = useState(false);
        const t = translations[lang].nav;
        return (
          <nav className="fixed top-0 w-full z-50 bg-background/40 dark:bg-[#0b101b]/40 backdrop-blur-2xl border-b border-black/5 dark:border-white/5 transition-colors duration-500">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-24 items-center">
                <Logo />
                <div className="hidden lg:flex items-center gap-10">
                  <div className="flex items-center gap-6">
                    {['home', 'about', 'mission', 'domains', 'news', 'org'].map(k => (
                      <a key={k} href={`#${k}`} className="text-[10px] font-black uppercase tracking-widest hover:text-secondary transition-colors">{t[k]}</a>
                    ))}
                  </div>
                  <div className="flex items-center gap-4">
                    <button onClick={toggleTheme} className="p-3 glass-card rounded-2xl hover:bg-white/10 transition-all text-primary">
                      {theme === 'dark' ? <Sun className="h-5 w-5" /> : <Moon className="h-5 w-5" />}
                    </button>
                    <div className="flex items-center gap-1 bg-white/5 p-1 rounded-2xl border border-white/10">
                      {['fr', 'en', 'sw'].map(l => (
                        <button key={l} onClick={() => setLang(l)} className={`px-3 py-1.5 rounded-xl text-[9px] font-black uppercase transition-all ${lang === l ? 'bg-gradient-gold text-black shadow-lg scale-105' : 'text-muted-foreground'}`}>{l}</button>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="lg:hidden flex items-center gap-3">
                   <button onClick={toggleTheme} className="p-2 glass-card rounded-xl text-primary">
                    {theme === 'dark' ? <Sun className="h-4 w-4" /> : <Moon className="h-4 w-4" />}
                  </button>
                  <button onClick={() => setIsOpen(!isOpen)} className="p-3 text-primary glass-card rounded-xl">
                    {isOpen ? <X /> : <Menu />}
                  </button>
                </div>
              </div>
            </div>
            <AnimatePresence>
              {isOpen && (
                <motion.div initial={{ opacity: 0, y: -20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="lg:hidden bg-background/95 dark:bg-[#0b101b]/95 backdrop-blur-3xl border-b border-white/5 px-8 py-12 flex flex-col gap-6 shadow-2xl">
                  {['home', 'about', 'mission', 'domains', 'news', 'org'].map(k => (
                    <a key={k} href={`#${k}`} onClick={() => setIsOpen(false)} className="text-xl font-black">{t[k]}</a>
                  ))}
                </motion.div>
              )}
            </AnimatePresence>
          </nav>
        );
      };

      const Hero = ({ lang }) => {
        const t = translations[lang].hero;
        return (
          <section id="home" className="relative min-h-screen flex items-center pt-32 pb-20 overflow-hidden">
            <div className="absolute inset-0 z-0">
               <img src="https://images.unsplash.com/photo-1516733725897-1aa73b87c8e8?q=80&w=2070&auto=format&fit=crop" className="w-full h-full object-cover opacity-20 grayscale" />
               <div className="absolute inset-0 bg-gradient-to-b from-background via-background/80 to-background dark:from-[#0b101b] dark:to-[#0b101b]" />
            </div>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
              <motion.div initial={{ opacity: 0, y: 40 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 1 }}>
                <span className="inline-block mb-6 px-6 py-1.5 border border-secondary/30 text-secondary bg-secondary/10 font-bold uppercase tracking-[0.5em] text-[8px] rounded-full">{t.badge}</span>
                <h1 className="text-4xl md:text-7xl font-black tracking-tighter mb-6 uppercase">
                  {t.title1} <span className="text-gradient-logo">{t.title2}</span> <br/>
                  <span className="text-foreground/20 dark:text-white/20">{t.title3}</span> <span className="text-secondary">{t.title4}</span> {t.title5}
                </h1>
                <p className="text-lg md:text-xl text-muted-foreground max-w-3xl mx-auto mb-10 font-medium leading-relaxed">{t.desc}</p>
                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                  <a href="#domains" className="px-8 py-4 bg-gradient-logo text-white rounded-xl font-bold shadow-xl hover:scale-105 transition-all inline-flex items-center gap-2">{t.cta1} <ChevronRight size={18}/></a>
                  <a href="#contact" className="px-8 py-4 glass-card rounded-xl font-bold hover:bg-white/10 transition-all">{t.cta2}</a>
                </div>
              </motion.div>
            </div>
          </section>
        );
      };

      const About = ({ lang }) => {
        const t = translations[lang].about;
        return (
          <section id="about" className="py-24">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid lg:grid-cols-2 gap-16 items-center">
              <motion.div initial={{ opacity: 0, x: -30 }} whileInView={{ opacity: 1, x: 0 }} viewport={{ once: true }}>
                <h2 className="text-3xl md:text-5xl font-black mb-8 tracking-tighter uppercase">{t.badge}</h2>
                <p className="text-gray-500 mb-6 font-medium leading-relaxed">{t.p1}</p>
                <p className="text-gray-500 mb-10 font-medium leading-relaxed">{t.p2}</p>
                <div className="grid grid-cols-2 gap-4">
                  <div className="p-6 glass-card rounded-2xl">
                    <MapPin className="text-secondary mb-4" />
                    <h4 className="text-[8px] font-black uppercase tracking-widest mb-1">{t.hq}</h4>
                    <p className="font-bold text-sm">Bukavu, RD Congo</p>
                  </div>
                  <div className="p-6 glass-card rounded-2xl">
                    <Calendar className="text-secondary mb-4" />
                    <h4 className="text-[8px] font-black uppercase tracking-widest mb-1">{t.founded}</h4>
                    <p className="font-bold text-sm">Février 2019</p>
                  </div>
                </div>
              </motion.div>
              <div className="relative aspect-[4/5] rounded-[3rem] overflow-hidden shadow-2xl">
                <img src="https://images.unsplash.com/photo-1531482615713-2afd69097998?q=80&w=2070&auto=format&fit=crop" className="w-full h-full object-cover" />
              </div>
            </div>
          </section>
        );
      };

      const Domains = ({ lang }) => {
        const t = translations[lang].domains;
        const icons = [Shield, HandHeart, Briefcase, MessageSquare, Sprout, Leaf, GraduationCap, Stethoscope, Pickaxe];
        return (
          <section id="domains" className="py-24">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-16">
                <h2 className="text-3xl md:text-5xl font-black tracking-tighter uppercase">{t.title}</h2>
                <p className="text-muted-foreground mt-4">{t.subtitle}</p>
              </div>
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                {t.items.map((item, i) => {
                  const Icon = icons[i];
                  return (
                    <motion.div key={i} whileHover={{ y: -10 }} className="p-8 glass-card rounded-3xl group h-full flex flex-col">
                      <div className="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-6 group-hover:bg-primary transition-all">
                        <Icon className="text-primary group-hover:text-white transition-colors" />
                      </div>
                      <h4 className="font-black text-xl mb-3 uppercase tracking-tight">{item.t}</h4>
                      <p className="text-muted-foreground text-sm leading-relaxed">{item.d}</p>
                    </motion.div>
                  )
                })}
              </div>
            </div>
          </section>
        );
      };

      const News = ({ lang }) => {
        const t = translations[lang].news;
        return (
          <section id="news" className="py-24">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <h2 className="text-3xl md:text-5xl font-black tracking-tighter uppercase text-center mb-16">{t.title}</h2>
              <div className="grid md:grid-cols-3 gap-8">
                {t.items.map((item, i) => (
                  <div key={i} className="glass-card rounded-[2rem] overflow-hidden group">
                    <div className="h-48 overflow-hidden">
                      <img src={item.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                    </div>
                    <div className="p-8">
                      <span className="text-[8px] font-black uppercase text-secondary tracking-widest">{item.cat}</span>
                      <h4 className="text-xl font-black mt-2 mb-4 uppercase">{item.t}</h4>
                      <p className="text-muted-foreground text-sm mb-6">{item.d}</p>
                      <button className="text-[10px] font-black uppercase text-primary inline-flex items-center gap-2">{t.readMore} <ChevronRight size={14}/></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      };

      const Footer = ({ lang }) => {
        const t = translations[lang].footer;
        return (
          <footer className="footer-bg pt-24 pb-12 border-t border-white/5" id="contact">
            <div className="max-w-7xl mx-auto px-4 grid md:grid-cols-3 gap-16 mb-20">
              <div>
                <Logo />
                <p className="mt-8 text-muted-foreground leading-relaxed">{t.desc}</p>
              </div>
              <div>
                <h4 className="font-black text-[10px] uppercase tracking-widest mb-8 text-secondary">{t.nav}</h4>
                <div className="grid grid-cols-1 gap-4 font-bold text-muted-foreground">
                   {['home', 'about', 'mission', 'domains', 'news'].map(k => (
                    <a key={k} href={`#${k}`} className="hover:text-white transition-colors">{translations[lang].nav[k]}</a>
                  ))}
                </div>
              </div>
              <div>
                <h4 className="font-black text-[10px] uppercase tracking-widest mb-8 text-secondary">{t.contact}</h4>
                <div className="space-y-6 text-muted-foreground font-bold text-sm">
                  <div className="flex gap-4">
                    <MapPin className="text-secondary shrink-0" />
                    <span>Commune d'Ibanda, Avenue Kalehe no 3, Bukavu, Sud-Kivu, RD Congo.</span>
                  </div>
                  <div className="flex gap-4">
                    <Heart className="text-secondary shrink-0" />
                    <span>apdeseorg@gmail.com</span>
                  </div>
                </div>
              </div>
            </div>
            <div className="text-center pt-12 border-t border-white/5 text-[8px] font-black uppercase tracking-[0.4em] text-muted-foreground/30">
              © {new Date().getFullYear()} APDESE NGO. {t.rights}
            </div>
          </footer>
        )
      }

      function App() {
        const [lang, setLang] = useState('fr');
        const [theme, setTheme] = useState('dark');

        useEffect(() => {
          document.documentElement.classList.toggle('dark', theme === 'dark');
        }, [theme]);

        return (
          <div className="dark:bg-[#0b101b] transition-colors duration-500">
            <Navbar lang={lang} setLang={setLang} theme={theme} toggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} />
            <main>
              <Hero lang={lang} />
              <About lang={lang} />
              <MissionVision lang={lang} />
              <Domains lang={lang} />
              <Resources lang={lang} />
              <News lang={lang} />
              <Organization lang={lang} />
              <Partners lang={lang} />
            </main>
            <Footer lang={lang} />
          </div>
        );
      }

      const MissionVision = ({ lang }) => {
        const t = translations[lang].mission;
        const [activeTab, setActiveTab] = useState('mission');
        return (
          <section id="mission" className="py-24 relative overflow-hidden">
            <div className="max-w-7xl mx-auto px-4 text-center mb-16 relative z-10">
              <h2 className="text-3xl md:text-5xl font-black mb-6 tracking-tighter uppercase">{t.title}</h2>
              <p className="text-muted-foreground max-w-2xl mx-auto">{t.subtitle}</p>
            </div>
            <div className="max-w-7xl mx-auto px-4 relative z-10">
              <div className="flex justify-center gap-4 mb-12">
                {['mission', 'vision'].map(tab => (
                  <button key={tab} onClick={() => setActiveTab(tab)} className={`px-8 py-3 rounded-xl font-black uppercase tracking-widest transition-all ${activeTab === tab ? 'bg-gradient-logo text-white shadow-xl' : 'bg-muted/50 text-muted-foreground hover:bg-muted'}`}>{t.tabs[tab]}</button>
                ))}
              </div>
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                {Object.entries(t.items).filter(([k]) => k.startsWith(activeTab === 'mission' ? 'm' : 'v')).map(([k, item], i) => (
                  <div key={k} className="p-8 glass-card rounded-2xl group shadow-xl">
                    <h4 className="font-black text-xl mb-3 text-foreground dark:text-white uppercase tracking-tight">{item.t}</h4>
                    <p className="text-muted-foreground text-sm leading-relaxed">{item.d}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      const Resources = ({ lang }) => {
        const t = translations[lang].resources;
        const items = [
          { ...t.human, icon: Users, color: "text-blue-500" },
          { ...t.material, icon: Building, color: "text-amber-500" },
          { ...t.financial, icon: Coins, color: "text-emerald-500" }
        ];
        return (
          <section id="resources" className="py-24">
            <div className="max-w-7xl mx-auto px-4 text-center mb-16">
              <h2 className="text-3xl md:text-5xl font-black mb-6 tracking-tighter uppercase">{t.title}</h2>
              <p className="text-muted-foreground">{t.subtitle}</p>
            </div>
            <div className="max-w-7xl mx-auto px-4 grid md:grid-cols-3 gap-6">
              {items.map((item, i) => (
                <div key={i} className="p-8 glass-card rounded-3xl group shadow-xl">
                  <div className={`w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center mb-6 ${item.color}`}>
                    <item.icon size={28} />
                  </div>
                  <h4 className="font-black text-xl mb-3 uppercase tracking-tight">{item.t}</h4>
                  <p className="text-muted-foreground text-sm leading-relaxed">{item.d}</p>
                </div>
              ))}
            </div>
          </section>
        );
      }

      const Organization = ({ lang }) => {
        const t = translations[lang].org;
        return (
          <section id="org" className="py-24">
            <div className="max-w-7xl mx-auto px-4 grid lg:grid-cols-2 gap-16 items-center">
              <div>
                <h2 className="text-3xl md:text-5xl font-black mb-8 tracking-tighter uppercase">{t.title}</h2>
                <p className="text-muted-foreground mb-8">{t.desc}</p>
                <div className="space-y-4">
                  {t.items.map((item, i) => (
                    <div key={i} className="flex items-center gap-4 p-4 glass-card rounded-xl hover:bg-white/10 transition-all">
                      <CheckCircle2 className="text-secondary" size={20} />
                      <span className="font-bold text-sm tracking-tight">{item}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div className="p-1 bg-gradient-logo rounded-3xl shadow-2xl">
                <div className="bg-background/80 dark:bg-[#0b101b]/80 p-8 rounded-[1.4rem] backdrop-blur-3xl">
                   {/* Simple Accordion implementation */}
                   {Object.entries(t.accordion).filter(([k]) => k.startsWith('t')).map(([k, title], i) => {
                     const descKey = 'd' + k.slice(1);
                     return (
                       <div key={k} className="mb-6 last:mb-0">
                         <h4 className="font-black text-lg mb-2 uppercase tracking-tight text-secondary">{title}</h4>
                         <p className="text-muted-foreground text-sm leading-relaxed">{t.accordion[descKey]}</p>
                       </div>
                     )
                   })}
                </div>
              </div>
            </div>
          </section>
        );
      }

      const Partners = ({ lang }) => {
        const t = translations[lang].partners;
        return (
          <section className="py-24 bg-white/5 border-y border-white/5">
            <div className="max-w-7xl mx-auto px-4 text-center">
              <h2 className="text-2xl font-bold mb-12 tracking-[0.6em] uppercase text-secondary/40">{t.title}</h2>
              <div className="flex flex-wrap justify-center items-center gap-12 opacity-50 grayscale hover:grayscale-0 transition-all">
                {[1, 2, 3, 4, 5].map(i => (
                  <div key={i} className="flex items-center gap-3">
                    <div className="w-10 h-10 glass-card rounded-full flex items-center justify-center">
                      <Globe size={20} className="text-primary" />
                    </div>
                    <span className="font-black text-lg uppercase tracking-tight">Partner {i}</span>
                  </div>
                ))}
              </div>
            </div>
          </section>
        )
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
